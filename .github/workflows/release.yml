name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Archive
        run: >
          xcodebuild -project searchy.xcodeproj
          -scheme searchy
          -configuration Release
          -archivePath build/Searchy.xcarchive
          CODE_SIGN_IDENTITY="-"
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGNING_ALLOWED=NO
          archive

      - name: Extract app from archive
        run: |
          mkdir -p build/export
          cp -R build/Searchy.xcarchive/Products/Applications/searchy.app build/export/

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R build/export/searchy.app build/dmg/
          create-dmg \
            --volname "Searchy" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 100 \
            --icon "searchy.app" 180 190 \
            --hide-extension "searchy.app" \
            --app-drop-link 480 190 \
            build/Searchy.dmg \
            build/dmg

      - name: Get SHA256
        id: sha
        run: echo "sha=$(shasum -a 256 build/Searchy.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          gh release create "$TAG_NAME" \
            build/Searchy.dmg \
            --title "Searchy $VERSION" \
            --notes "## Searchy $VERSION

          ### Install
          \`\`\`
          brew install --cask ausafmo/searchy/searchy
          \`\`\`

          ### DMG SHA256
          \`\`\`
          $SHA
          \`\`\`"

      - name: Print summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** $VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA256:** \`$SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Update Homebrew cask with the SHA above." >> "$GITHUB_STEP_SUMMARY"
